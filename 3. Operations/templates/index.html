<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MMR classification</title>
    <style>
      body {
        font-family: Calibri, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 2rem;
        box-sizing: border-box;
        background-image: url("{{ url_for('static', filename='images/bg.jpg') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .page {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 1.5rem;
        width: 100%;
        max-width: 1200px;
      }

      .wrapper,
      .results-wrapper {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        flex-shrink: 0;
      }

      .results-wrapper {
        display: none;
      }

      .hero-image {
        width: 160px;
        height: 160px;
        object-fit: contain;
        display: block;
        margin: 0 auto 1rem auto;
      }

      h1,
      h2 {
        margin-top: 0;
        text-align: center;
      }

      h2 {
        font-size: 1.2rem;
        color: #333;
      }

      label {
        display: block;
        margin-top: 0.75rem;
        font-weight: 600;
      }

      .optional-label {
        font-weight: 400;
        color: #888;
        font-size: 0.85rem;
        margin-left: 0.4rem;
      }

      input,
      select,
      button {
        padding: 0.6rem;
        font-size: 1rem;
        font-family: Calibri, sans-serif;
        width: 100%;
        box-sizing: border-box;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        margin-top: 1rem;
        cursor: pointer;
        background-color: #4a90e2;
        color: white;
        border: none;
        font-weight: 600;
      }

      button:hover {
        background-color: #357abd;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 1rem;
        margin-top: 1rem;
        background-color: #fafafa;
      }

      .mmr-badge {
        text-align: center;
        font-size: 1.3rem;
        font-weight: 700;
        padding: 0.75rem;
        border-radius: 12px;
        margin-top: 1rem;
      }

      .mmr-high {
        background: #d4edda;
        color: #0a7a2f;
      }

      .mmr-medium {
        background: #fff3cd;
        color: #856404;
      }

      .mmr-low {
        background: #f8d7da;
        color: #b00020;
      }

      .error {
        color: #b00020;
      }

      .hint {
        color: #555;
        text-align: center;
      }

      .plots {
        margin-top: 1rem;
      }

      .plot-card {
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 0.75rem;
        margin-top: 0.75rem;
        background: #fafafa;
        text-align: center;
      }

      .plot-card img {
        width: 100%;
        border-radius: 8px;
      }

      .popup-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .popup-card {
        width: 92%;
        max-width: 420px;
        background: #fff;
        border-radius: 14px;
        padding: 1.25rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        text-align: center;
      }

      .popup-title {
        margin: 0 0 0.5rem 0;
        font-size: 1.2rem;
        font-weight: 700;
      }

      .popup-text {
        margin: 0.5rem 0 1rem 0;
        color: #333;
      }

      .popup-rank-image {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin: 0.25rem auto 1rem auto;
        display: block;
      }

      .popup-btn {
        background: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.55rem 1rem;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="wrapper">
        <img
          class="hero-image"
          src="{{ url_for('static', filename='images/logo.png') }}"
          alt="MMR logo"
        />
        <h1>MMR Prediction</h1>
        <p class="hint">
          Enter values for all 4 model features, then click Predict.
        </p>

        <label for="kd">k/d</label>
        <input id="kd" type="number" step="any" placeholder="e.g. 1.25" />

        <label for="matchesPlayed">matchs_played</label>
        <input
          id="matchesPlayed"
          type="number"
          step="1"
          placeholder="e.g. 42"
        />

        <label for="headshotPct">headshot_%</label>
        <input
          id="headshotPct"
          type="number"
          step="any"
          placeholder="e.g. 0.56"
        />

        <label for="dmgRnd">dmg/rnd</label>
        <input id="dmgRnd" type="number" step="any" placeholder="e.g. 0.61" />

        <label for="rank">Rank</label>
        <select id="rank">
          <option value="Unranked" selected>Unranked</option>
          <option value="Iron">Iron</option>
          <option value="Bronze">Bronze</option>
          <option value="Silver">Silver</option>
          <option value="Gold">Gold</option>
          <option value="Platinum">Platinum</option>
          <option value="Diamond">Diamond</option>
          <option value="Ascendant">Ascendant</option>
          <option value="Immortal">Immortal</option>
          <option value="Radiant">Radiant</option>
        </select>

        <button id="predictBtn">Predict</button>
        <p
          id="status"
          class="error"
          style="display: none; margin-top: 0.5rem"
        ></p>
      </div>

      <div class="results-wrapper" id="resultsPanel">
        <h2>Results</h2>
        <div class="card">
          <strong>Predicted win%</strong>
          <p
            id="result"
            style="font-size: 1.4rem; margin: 0.25rem 0 0; font-weight: 700"
          ></p>
          <p id="rankDisplay" style="color: #555; margin: 0.25rem 0 0"></p>
        </div>
        <div class="mmr-badge" id="mmrBadge"></div>
        <div class="plots" id="plots"></div>
      </div>
    </div>

    <div class="popup-backdrop" id="rankPopup">
      <div class="popup-card">
        <h3 class="popup-title">Predicted Rank</h3>
        <img
          id="rankPopupImage"
          class="popup-rank-image"
          src="{{ url_for('static', filename='images/ranks/default.png') }}"
          alt="Predicted rank image"
        />
        <p class="popup-text" id="rankPopupText"></p>
        <button class="popup-btn" id="closePopupBtn">Close</button>
      </div>
    </div>

    <script>
      const btn = document.getElementById("predictBtn");
      const kdInput = document.getElementById("kd");
      const matchesInput = document.getElementById("matchesPlayed");
      const headshotInput = document.getElementById("headshotPct");
      const dmgInput = document.getElementById("dmgRnd");
      const rankInput = document.getElementById("rank");
      const statusEl = document.getElementById("status");
      const resultsPanel = document.getElementById("resultsPanel");
      const resultEl = document.getElementById("result");
      const rankDisplay = document.getElementById("rankDisplay");
      const mmrBadge = document.getElementById("mmrBadge");
      const plotsEl = document.getElementById("plots");
      const rankPopup = document.getElementById("rankPopup");
      const rankPopupText = document.getElementById("rankPopupText");
      const rankPopupImage = document.getElementById("rankPopupImage");
      const closePopupBtn = document.getElementById("closePopupBtn");

      const rankOrder = [
        "Unranked",
        "Iron",
        "Bronze",
        "Silver",
        "Gold",
        "Platinum",
        "Diamond",
        "Ascendant",
        "Immortal",
        "Radiant",
      ];

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function shiftFromPrediction(predictedWinPct) {
        if (predictedWinPct >= 80) return 2;
        if (predictedWinPct >= 70) return 1;
        if (predictedWinPct >= 45) return 0;
        if (predictedWinPct >= 30) return -1;
        return -2;
      }

      function getPredictedRank(currentRank, predictedWinPct) {
        const currentIndex = rankOrder.indexOf(currentRank);
        if (currentIndex === -1) return null;
        const nextIndex = clamp(
          currentIndex + shiftFromPrediction(predictedWinPct),
          0,
          rankOrder.length - 1,
        );
        return rankOrder[nextIndex];
      }

      function showRankPopup(currentRank, predictedRank, predictedWinPct) {
        rankPopupText.textContent = `Current rank: ${currentRank} | Predicted rank: ${predictedRank} | Predicted win%: ${predictedWinPct.toFixed(2)}%`;
        rankPopupImage.src = `/static/images/ranks/${predictedRank.toLowerCase()}.png`;
        rankPopup.style.display = "flex";
      }

      closePopupBtn.addEventListener("click", () => {
        rankPopup.style.display = "none";
      });

      rankPopup.addEventListener("click", (e) => {
        if (e.target === rankPopup) rankPopup.style.display = "none";
      });

      btn.addEventListener("click", async () => {
        statusEl.style.display = "none";
        statusEl.textContent = "";

        const kd = Number(kdInput.value);
        const matchesPlayed = Number(matchesInput.value);
        const headshotPct = Number(headshotInput.value);
        const dmgRnd = Number(dmgInput.value);
        const rank = rankInput.value || "Unranked";

        if (
          kdInput.value === "" ||
          matchesInput.value === "" ||
          headshotInput.value === "" ||
          dmgInput.value === ""
        ) {
          statusEl.textContent = "Please fill in all required feature fields.";
          statusEl.style.display = "block";
          return;
        }

        const payload = {
          features: [kd, matchesPlayed, headshotPct, dmgRnd],
          rank: rank,
        };

        try {
          const response = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();

          if (!response.ok) {
            statusEl.textContent =
              data.error || `Request failed (${response.status})`;
            statusEl.style.display = "block";
            return;
          }

          resultsPanel.style.display = "block";
          resultEl.textContent = `${data.predicted_value.toFixed(4)}%`;
          rankDisplay.textContent = `Rank: ${rank}`;

          mmrBadge.textContent = `${data.mmr_label} — ${data.mmr_detail}`;
          mmrBadge.className = "mmr-badge";
          if (data.mmr_label === "High MMR") mmrBadge.classList.add("mmr-high");
          else if (data.mmr_label === "Low MMR")
            mmrBadge.classList.add("mmr-low");
          else mmrBadge.classList.add("mmr-medium");

          plotsEl.innerHTML = "";
          if (data.plots && data.plots.length > 0) {
            data.plots.forEach((plot) => {
              const card = document.createElement("div");
              card.className = "plot-card";
              const img = document.createElement("img");
              img.src = `data:image/png;base64,${plot.image}`;
              img.alt = `Plot for ${plot.feature}`;
              card.appendChild(img);
              plotsEl.appendChild(card);
            });
          }

          if (rank !== "Unranked") {
            const predictedRank = getPredictedRank(rank, data.predicted_value);
            if (predictedRank) {
              showRankPopup(rank, predictedRank, data.predicted_value);
            }
          }
        } catch (err) {
          statusEl.textContent = `Network/server error: ${String(err)}`;
          statusEl.style.display = "block";
        }
      });
    </script>
  </body>
</html>
