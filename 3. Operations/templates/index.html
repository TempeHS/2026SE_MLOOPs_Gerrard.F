<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polynomial Model Predictor</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        max-width: 700px;
      }
      label {
        display: block;
        margin-top: 0.75rem;
        font-weight: 600;
      }
      input,
      button {
        padding: 0.6rem;
        font-size: 1rem;
        width: 100%;
        box-sizing: border-box;
      }
      button {
        margin-top: 1rem;
        cursor: pointer;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
        margin-top: 1rem;
      }
      .error {
        color: #b00020;
      }
      .ok {
        color: #0a7a2f;
      }
      .hint {
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Model Prediction</h1>
    <p class="hint">Enter values for each feature, then click Predict.</p>

    <label for="kd">k/d</label>
    <input id="kd" type="number" step="any" placeholder="e.g. 1.25" />

    <label for="matchesPlayed">matchs_played</label>
    <input id="matchesPlayed" type="number" step="1" placeholder="e.g. 42" />

    <button id="predictBtn">Predict</button>

    <div class="card">
      <strong>Result:</strong>
      <p id="result">No prediction yet.</p>
      <p id="status"></p>
    </div>

    <script>
      const btn = document.getElementById("predictBtn");
      const kdInput = document.getElementById("kd");
      const matchesInput = document.getElementById("matchesPlayed");
      const resultEl = document.getElementById("result");
      const statusEl = document.getElementById("status");

      btn.addEventListener("click", async () => {
        statusEl.textContent = "";
        statusEl.className = "";
        resultEl.textContent = "Running...";

        const kd = Number(kdInput.value);
        const matchesPlayed = Number(matchesInput.value);

        if (Number.isNaN(kd) || Number.isNaN(matchesPlayed)) {
          resultEl.textContent = "Please provide valid numeric inputs.";
          statusEl.textContent = "Input error";
          statusEl.className = "error";
          return;
        }

        try {
          const response = await fetch("/api/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ features: [kd, matchesPlayed] }), // order must match backend
          });

          const data = await response.json();

          if (!response.ok) {
            resultEl.textContent = data.error || "Request failed";
            statusEl.textContent = `Request failed (${response.status})`;
            statusEl.className = "error";
            return;
          }

          resultEl.textContent = `Predicted value (${data.target}): ${data.predicted_value.toFixed(4)}`;
          statusEl.textContent = "Prediction successful";
          statusEl.className = "ok";
        } catch (err) {
          resultEl.textContent = String(err);
          statusEl.textContent = "Network/server error";
          statusEl.className = "error";
        }
      });
    </script>
  </body>
</html>
